<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="description" content="政経の暗記カードと正誤問題">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <title>政経暗記</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --muted: #667482;
      --line: #d7dee6;
      --panel: #ffffff;
      --bg: #eef2f6;
      --accent: #0f766e;
      --accent-dark: #0b4f4b;
      --danger: #b42318;
      --danger-bg: #fff0ee;
      --warn: #a15c00;
      --warn-bg: #fff7df;
      --ok: #166534;
      --ok-bg: #edf9ef;
      --blue: #1d4ed8;
      --blue-bg: #eef5ff;
      --shadow: 0 10px 26px rgba(23, 33, 43, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic UI", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    button, input { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      cursor: pointer;
      min-height: 42px;
      transition: transform .08s ease, border-color .15s ease, background .15s ease, color .15s ease;
    }
    button:hover { border-color: #98a7b6; background: #f8fafc; }
    button:active { transform: translateY(1px); }
    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-weight: 700;
    }
    button.ghost { background: transparent; }
    button.selected {
      border-color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent);
      background: #eefaf7;
      color: #0b4f4b;
    }
    button.correct { background: var(--ok-bg); border-color: #8ccc9a; }
    button.wrong { background: var(--danger-bg); border-color: #ef9a91; }
    button:disabled { cursor: default; opacity: .7; }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    header { padding: 0 0 12px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(72px, 1fr));
      gap: 8px;
      width: min(520px, 100%);
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .stat strong {
      display: block;
      font-size: 20px;
      margin-top: 2px;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      align-items: start;
    }
    .side, .main {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .side { padding: 14px; position: sticky; top: 16px; }
    .main { min-height: 620px; overflow: hidden; }

    details.control-panel {
      border: 0;
      border-radius: 0;
      background: transparent;
      margin-bottom: 16px;
      overflow: hidden;
    }
    details.control-panel summary {
      min-height: 0;
      padding: 0 0 8px;
      cursor: default;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .04em;
      color: var(--muted);
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    details.control-panel summary::-webkit-details-marker { display: none; }
    details.control-panel summary::after { content: ""; }
    .control-body {
      border-top: 0;
      padding: 0;
    }
    .section-title {
      margin: 14px 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
    }
    .mode-grid, .stage-grid {
      display: grid;
      gap: 8px;
    }
    .mode-grid button, .stage-grid button {
      width: 100%;
      text-align: left;
      padding: 10px 11px;
      line-height: 1.35;
      background: #fbfcfd;
    }
    .mode-grid small, .stage-grid small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }
    .action-stack {
      display: grid;
      gap: 8px;
    }
    .action-stack button {
      width: 100%;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }
    .toolbar input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      min-height: 42px;
      background: #f8fafc;
    }
    .toolbar input:focus {
      outline: 2px solid rgba(15, 118, 110, .22);
      border-color: var(--accent);
      background: white;
    }

    .arena {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 250px;
      gap: 16px;
      padding: 16px;
    }
    .question-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      min-height: 470px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .question-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--blue-bg);
      color: var(--blue);
      border: 1px solid #c7dbff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge.a { background: #fff1f2; color: #be123c; border-color: #fecdd3; }
    .badge.b { background: #fffbeb; color: #a15c00; border-color: #fde68a; }
    .badge.c { background: #eef5ff; color: #1d4ed8; border-color: #bfdbfe; }
    .question-body { padding: 18px; }
    .prompt-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .prompt {
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.22;
      font-weight: 800;
      margin: 0 0 14px;
      letter-spacing: 0;
    }
    .hint {
      color: var(--muted);
      line-height: 1.7;
      border-left: 3px solid #9fd5cf;
      padding: 4px 0 4px 10px;
      margin: 12px 0 0;
    }
    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }
    .choices button {
      min-height: 72px;
      padding: 13px 14px;
      text-align: left;
      line-height: 1.45;
      font-weight: 700;
    }
    .text-answer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 18px;
    }
    .text-answer input {
      border: 1px solid var(--line);
      border-radius: 7px;
      min-height: 48px;
      padding: 10px 12px;
      font-size: 18px;
    }
    .feedback {
      border-top: 1px solid var(--line);
      padding: 13px 14px;
      min-height: 76px;
      line-height: 1.6;
      background: #fbfcfd;
    }
    .feedback.ok { background: var(--ok-bg); color: var(--ok); }
    .feedback.bad { background: var(--danger-bg); color: var(--danger); }
    .feedback b { color: inherit; }

    .right-panel {
      display: grid;
      gap: 10px;
    }
    .meter, .weak-list, .flow-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: white;
    }
    .meter .bar {
      height: 12px;
      border-radius: 999px;
      background: #edf1f4;
      overflow: hidden;
      margin-top: 8px;
    }
    .meter .fill {
      height: 100%;
      width: 0%;
      background: #0f766e;
      transition: width .25s ease;
    }
    .weak-list ul {
      margin: 8px 0 0;
      padding: 0;
      list-style: none;
      max-height: 220px;
      overflow: auto;
    }
    .weak-list li {
      border-top: 1px solid #eef2f5;
      padding: 7px 0;
      font-size: 13px;
      line-height: 1.35;
    }
    .flow-box ol {
      margin: 8px 0 0;
      padding-left: 21px;
      line-height: 1.7;
    }

    .deck-view {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 10px;
    }
    .mini-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 12px;
      min-height: 130px;
    }
    .mini-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.3;
    }
    .mini-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    @media (min-width: 901px) {
      details.control-panel summary {
        pointer-events: none;
      }
    }

    @media (max-width: 900px) {
      header, .layout, .arena {
        grid-template-columns: 1fr;
      }
      .app { padding: 10px; }
      .side {
        position: static;
        padding: 10px;
        box-shadow: none;
      }
      details.control-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        margin-bottom: 8px;
      }
      details.control-panel summary {
        min-height: 44px;
        padding: 11px 12px;
        cursor: pointer;
        letter-spacing: .04em;
      }
      details.control-panel summary::after {
        content: "+";
        font-size: 18px;
        color: var(--ink);
        line-height: 1;
      }
      details.control-panel[open] summary::after { content: "-"; }
      .control-body {
        border-top: 1px solid var(--line);
        padding: 10px;
      }
      .toolbar { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(5, minmax(0,1fr)); min-width: 0; }
      .choices { grid-template-columns: 1fr; }
      .main { min-height: auto; }
      .question-card { min-height: 0; }
    }
    @media (max-width: 560px) {
      body {
        background: var(--bg);
      }
      .stats {
        grid-template-columns: repeat(5, minmax(0,1fr));
        gap: 6px;
      }
      .stat {
        padding: 7px 6px;
        text-align: center;
      }
      .stat span { font-size: 11px; }
      .stat strong { font-size: 18px; }
      .mode-grid button, .stage-grid button {
        min-height: 46px;
        padding: 9px 10px;
      }
      .mode-grid small, .stage-grid small { display: none; }
      .toolbar {
        padding: 10px;
      }
      .arena {
        gap: 10px;
        padding: 10px;
      }
      .question-top,
      .question-body,
      .feedback {
        padding-left: 12px;
        padding-right: 12px;
      }
      .prompt {
        font-size: 28px;
        line-height: 1.26;
      }
      .choices button {
        min-height: 58px;
        padding: 10px;
      }
      .right-panel {
        display: none;
      }
        .deck-view {
        padding: 10px;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="stats" aria-label="成績">
        <div class="stat"><span>正解</span><strong id="okCount">0</strong></div>
        <div class="stat"><span>ミス</span><strong id="missCount">0</strong></div>
        <div class="stat"><span>既習</span><strong id="learnedCount">0</strong></div>
        <div class="stat"><span>連続</span><strong id="streakCount">0</strong></div>
        <div class="stat"><span>弱点</span><strong id="weakCount">0</strong></div>
      </div>
    </header>

    <div class="layout">
      <aside class="side">
        <details class="control-panel" id="modePanel">
          <summary>MODE</summary>
          <div class="control-body">
            <div class="mode-grid" id="modeGrid"></div>
          </div>
        </details>
        <details class="control-panel" id="stagePanel">
          <summary>STAGE</summary>
          <div class="control-body">
            <div class="stage-grid" id="stageGrid"></div>
          </div>
        </details>
        <div class="action-stack">
          <button class="primary" id="startBtn">50問開始</button>
          <button class="ghost" id="weakBtn">弱点だけ</button>
          <button class="ghost" id="resetBtn">リセット</button>
        </div>
      </aside>

      <main class="main">
        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="用語を検索">
          <button id="deckBtn">カード一覧</button>
        </div>
        <div id="gameArea" class="arena"></div>
      </main>
    </div>
  </div>

  <script>
    const baseCards = [
      {id:"imf", stage:"8-10", importance:"A", term:"IMF", clue:"通貨・為替安定、短期融資", trap:"IBRDと役割を逆にする", pair:"ブレトンウッズ体制"},
      {id:"ibrd", stage:"8-10", importance:"A", term:"IBRD", clue:"復興・開発の長期融資", trap:"IMFと役割を逆にする", pair:"世界銀行"},
      {id:"gatt", stage:"8-10", importance:"A", term:"GATT", clue:"自由・無差別・多角、関税引き下げ", trap:"紛争処理機関とする", pair:"WTOの前身"},
      {id:"wto", stage:"8-10", importance:"A", term:"WTO", clue:"GATTを発展させた国際機関、紛争処理", trap:"1947年に設立とする", pair:"知的財産も扱う"},
      {id:"nixon", stage:"8-10", importance:"A", term:"ニクソン・ショック", clue:"金・ドル交換停止", trap:"円高是正と混同", pair:"変動相場制へ"},
      {id:"smithsonian", stage:"8-10", importance:"A", term:"スミソニアン協定", clue:"1ドル360円から308円、固定相場維持の試み", trap:"変動相場制の追認と混同", pair:"ニクソン後"},
      {id:"kingston", stage:"8-10", importance:"A", term:"キングストン合意", clue:"変動相場制を追認", trap:"固定相場制への復帰とする", pair:"IMF体制の転換"},
      {id:"plaza", stage:"8-10", importance:"A", term:"プラザ合意", clue:"G5、ドル高是正、円高へ", trap:"円安に向かったとする", pair:"円高不況"},
      {id:"ftaepa", stage:"8-10", importance:"A", term:"FTA/EPA", clue:"FTAは関税中心、EPAは投資や労働力移動も含む", trap:"EPAを関税だけにする", pair:"経済連携"},
      {id:"tpp", stage:"8-10", importance:"A", term:"TPP/CPTPP", clue:"環太平洋の経済連携", trap:"RCEPや米国参加を混ぜる", pair:"CPTPP"},
      {id:"rcep", stage:"8-10", importance:"A", term:"RCEP", clue:"ASEANに日中韓豪NZが関わる枠組み", trap:"インド参加とする", pair:"地域的な包括的経済連携"},
      {id:"euflow", stage:"8-10", importance:"A", term:"EU年表", clue:"ECSCから出発し、EEC/EURATOM、EC、EUへ", trap:"順番を入れ替える", pair:"マーストリヒト条約"},
      {id:"hedge", stage:"8-10", importance:"B", term:"ヘッジファンド", clue:"アジア通貨危機で資金引き上げが問題化", trap:"政府開発援助と混同", pair:"タイ・バーツ"},
      {id:"subprime", stage:"8-10", importance:"B", term:"サブプライムローン問題", clue:"2008年世界金融危機につながる", trap:"石油危機と混同", pair:"リーマン・ショック"},

      {id:"sme", stage:"11-12", importance:"A", term:"中小企業の地位", clue:"企業数約99%、従業員約70%", trap:"従業員も99%とする", pair:"二重構造"},
      {id:"dual", stage:"11-12", importance:"A", term:"二重構造", clue:"大企業と中小企業の賃金・生産性・労働条件の格差", trap:"大企業が劣るとする", pair:"下請け"},
      {id:"farmland", stage:"11-12", importance:"A", term:"農地改革", clue:"寄生地主制解体、自作農創出", trap:"大規模化を達成とする", pair:"自作農"},
      {id:"agri-basic", stage:"11-12", importance:"A", term:"農業基本法", clue:"農家所得向上、選択的拡大", trap:"食糧管理制度廃止と混同", pair:"選択的拡大"},
      {id:"food-law", stage:"11-12", importance:"A", term:"新食糧法", clue:"食糧管理制度を廃止、米流通自由化", trap:"米管理を強化とする", pair:"食糧管理制度"},
      {id:"minimum", stage:"11-12", importance:"A", term:"ミニマム・アクセス", clue:"最低輸入機会、WTO農業協定と接続", trap:"完全輸入禁止とする", pair:"関税化"},
      {id:"pl-law", stage:"11-12", importance:"A", term:"PL法", clue:"欠陥製品の被害救済、無過失責任", trap:"契約取消制度とする", pair:"製造物責任"},
      {id:"cooling", stage:"11-12", importance:"A", term:"クーリング・オフ", clue:"一定期間内の契約解除", trap:"欠陥製品責任と混同", pair:"特定商取引法"},
      {id:"ppp", stage:"11-12", importance:"A", term:"PPP", clue:"汚染者負担の原則", trap:"消費者負担とする", pair:"公害"},
      {id:"assessment", stage:"11-12", importance:"A", term:"環境アセスメント", clue:"開発前の環境影響評価", trap:"事後対策とする", pair:"環境基本法"},
      {id:"3r", stage:"11-12", importance:"A", term:"3R", clue:"リデュース、リユース、リサイクル。最優先はリデュース", trap:"リサイクル最優先とする", pair:"循環型社会"},
      {id:"consumer", stage:"11-12", importance:"B", term:"消費者の4つの権利", clue:"知らされる、安全、意見を聞いてもらう、選ぶ", trap:"企業の販売権と混同", pair:"消費者主権"},
      {id:"treaty", stage:"11-12", importance:"B", term:"環境条約", clue:"ラムサール、ワシントン、モントリオール、バーゼル、京都、パリ", trap:"対象を入れ替える", pair:"地球環境問題"},

      {id:"zaibatsu", stage:"3-3-1", importance:"A", term:"財閥解体", clue:"持株会社、15財閥、独占禁止法", trap:"持株会社を強化とする", pair:"経済民主化"},
      {id:"kosaku", stage:"3-3-1", importance:"A", term:"自作農", clue:"農地改革、寄生地主制の解体", trap:"大規模農業と混同", pair:"農地改革"},
      {id:"keisha", stage:"3-3-1", importance:"A", term:"傾斜生産方式", clue:"石炭・鉄鋼へ重点投入", trap:"マーシャル・プラン中心とする", pair:"復金インフレ"},
      {id:"dodge", stage:"3-3-1", importance:"A", term:"ドッジ・ライン", clue:"超均衡予算、1ドル=360円", trap:"インフレ促進策とする", pair:"デフレ不況"},
      {id:"shoup", stage:"3-3-1", importance:"A", term:"シャウプ勧告", clue:"直接税中心の税制改革", trap:"関税引き下げと混同", pair:"税制改革"},
      {id:"korean", stage:"3-3-1", importance:"A", term:"朝鮮戦争", clue:"特需景気、鉱工業生産回復", trap:"石油危機と混同", pair:"特需景気"},
      {id:"income", stage:"3-3-1", importance:"A", term:"国民所得倍増計画", clue:"池田内閣、1960年", trap:"小泉構造改革と混同", pair:"高度経済成長"},
      {id:"gatt11", stage:"3-3-1", importance:"A", term:"GATT11条国", clue:"貿易自由化、輸入制限できない国", trap:"為替管理と混同", pair:"開放経済体制"},
      {id:"imf8", stage:"3-3-1", importance:"A", term:"IMF8条国", clue:"為替自由化、為替管理できない国", trap:"輸入制限と混同", pair:"開放経済体制"},
      {id:"ceiling", stage:"3-3-1", importance:"A", term:"国際収支の天井", clue:"外貨不足で成長が止まる", trap:"財政赤字の上限とする", pair:"高度成長前半"},
      {id:"stag", stage:"3-3-1", importance:"A", term:"スタグフレーション", clue:"不況とインフレが同時に起こる", trap:"好況と物価下落とする", pair:"石油危機"},
      {id:"genryo", stage:"3-3-1", importance:"A", term:"減量経営", clue:"人員整理、FA化、OA化", trap:"雇用拡大策とする", pair:"ME革命"},
      {id:"kudoka", stage:"3-3-1", importance:"A", term:"産業の空洞化", clue:"海外生産で国内雇用が低下", trap:"国内工場増加とする", pair:"円高"},
      {id:"badloan", stage:"3-3-1", importance:"A", term:"不良債権", clue:"回収不能債権、金融機関悪化", trap:"政府開発援助と混同", pair:"バブル崩壊"},

      {id:"adv-110-tariffication-2", stage:"11-12", importance:"A", statement:"関税化とは、関税をすべて撤廃して農産物輸入を完全自由化することである。", answer:false, explain:"p.110・p.120。数量制限から関税へ。"},
      {id:"adv-110-multifunction-1", stage:"11-12", importance:"B", statement:"食料・農業・農村基本法では、食料安定供給や農業の多面的機能が重視される。", answer:true, explain:"p.110周辺。農業の多面的機能。"},
      {id:"adv-110-traceability-1", stage:"11-12", importance:"B", statement:"トレーサビリティは食品の生産・流通履歴を追跡できる仕組みである。", answer:true, explain:"p.110。牛トレーサビリティ法など。"},
      {id:"adv-110-traceability-2", stage:"11-12", importance:"B", statement:"トレーサビリティは消費者が契約を一定期間内に解除する制度である。", answer:false, explain:"p.110・p.111。契約解除はクーリング・オフ。"},
      {id:"adv-110-postharvest-1", stage:"11-12", importance:"C", statement:"ポスト・ハーベストは収穫後に使われる農薬などと関係する語である。", answer:true, explain:"p.110。細かめだが選択肢消去に使える。"},
      {id:"adv-110-sixth-2", stage:"11-12", importance:"B", statement:"6次産業化は農業者が加工や販売にも関わり、1次・2次・3次産業を組み合わせる考え方である。", answer:true, explain:"p.120。1×2×3=6のイメージ。"},
      {id:"adv-111-consumer-rights-1", stage:"11-12", importance:"B", statement:"消費者の権利には、知らされる権利、安全を求める権利、意見を聞いてもらう権利、選ぶ権利などがある。", answer:true, explain:"p.111。権利名の組み合わせ。"},
      {id:"adv-111-consumer-basic-1", stage:"11-12", importance:"B", statement:"消費者基本法は消費者の権利を明確化する方向の法律である。", answer:true, explain:"p.111。消費者保護基本法からの流れで問われる。"},
      {id:"adv-111-consumer-center-1", stage:"11-12", importance:"B", statement:"消費生活センターは消費者相談などと関係する機関である。", answer:true, explain:"p.111。消費者庁・消費生活センターの識別。"},
      {id:"adv-111-consumer-agency-1", stage:"11-12", importance:"B", statement:"消費者庁は消費者行政を一元化するために設置された。", answer:true, explain:"p.111。消費者行政の担当。"},
      {id:"adv-111-dependence-2", stage:"11-12", importance:"B", statement:"依存効果は、広告などで消費者の欲望が生産者側から作られるという考え方である。", answer:true, explain:"p.111。消費者主権への疑問。"},
      {id:"adv-111-demonstration-2", stage:"11-12", importance:"B", statement:"デモンストレーション効果は、他人の消費に影響されて自分の消費が変化することをいう。", answer:true, explain:"p.111。見せびらかし・周囲の影響。"},
      {id:"adv-112-seven-1", stage:"11-12", importance:"B", statement:"典型7公害には、大気汚染・水質汚濁・騒音・振動・悪臭などが含まれる。", answer:true, explain:"p.112。典型7公害は細かい選択肢で出る。"},
      {id:"adv-112-pollution-diet-1", stage:"11-12", importance:"B", statement:"1970年の公害国会では、公害対策基本法改正など公害関連法制が整備された。", answer:true, explain:"p.112。公害国会。"},
      {id:"adv-112-harmony-1", stage:"11-12", importance:"B", statement:"公害国会では経済調和条項が強化され、環境より経済成長を優先することが明記された。", answer:false, explain:"p.112。経済調和条項は削除の方向。"},
      {id:"adv-112-total-reg-1", stage:"11-12", importance:"B", statement:"公害対策では濃度規制だけでなく、総量規制も重要になる。", answer:true, explain:"p.112。濃度規制から総量規制へ。"},
      {id:"adv-112-env-agency-1", stage:"11-12", importance:"B", statement:"環境庁は後に環境省へ昇格した。", answer:true, explain:"p.112。1971環境庁、2001環境省。"},
      {id:"adv-112-env-basic-1", stage:"11-12", importance:"A", statement:"環境基本法は公害対策基本法を発展させ、総合的な環境行政の基本となる法律である。", answer:true, explain:"p.112。環境アセスメントとは別。"},
      {id:"adv-113-sustainable-2", stage:"11-12", importance:"A", statement:"持続可能な発展は、将来世代の必要を損なわずに現在世代の必要を満たす考え方である。", answer:true, explain:"p.113・p.149。環境と開発の定番。"},
      {id:"adv-113-sustainable-3", stage:"11-12", importance:"A", statement:"持続可能な発展は、環境保全を一切考えず現在の経済成長だけを最大化する考え方である。", answer:false, explain:"p.113・p.149。将来世代・環境との両立。"},
      {id:"adv-113-precaution-2", stage:"11-12", importance:"B", statement:"予防原則は、科学的に完全に確実でなくても重大被害のおそれがあれば予防的に対応する考え方である。", answer:true, explain:"p.113。事後対応だけではない。"},
      {id:"adv-113-emission-2", stage:"11-12", importance:"B", statement:"排出量取引は排出枠を売買する仕組みで、温暖化対策などと関係する。", answer:true, explain:"p.113。京都メカニズムとも接続。"},
      {id:"adv-113-green-purchase-1", stage:"11-12", importance:"C", statement:"グリーン購入法は環境負荷の少ない製品を優先的に購入する考え方と関係する。", answer:true, explain:"p.113。リサイクル法の細部。"},
      {id:"adv-113-cogeneration-1", stage:"11-12", importance:"C", statement:"コージェネレーションは発電時の排熱も利用し、エネルギー利用効率を高める仕組みである。", answer:true, explain:"p.113。新しいエネルギー利用。"},
      {id:"adv-123-osaka-1", stage:"11-12", importance:"C", statement:"大阪空港訴訟は騒音公害など環境被害の論点と関係する。", answer:true, explain:"p.123問題演習。細部だが公害訴訟系。"},
      {id:"adv-123-tomonoura-1", stage:"11-12", importance:"C", statement:"鞆の浦埋立ては景観・環境保全と開発の対立に関係する論点である。", answer:true, explain:"p.123問題演習。開発と環境の対立。"},

      {id:"adv-147-bretton-1", stage:"8-10", importance:"A", statement:"ブレトンウッズ体制は金とドルの交換を前提に、ドルを基軸通貨とする固定相場制をとった。", answer:true, explain:"p.147・p.156。金・ドル・固定相場。"},
      {id:"adv-147-bretton-2", stage:"8-10", importance:"A", statement:"ブレトンウッズ体制では金との関係を完全に断ち、各国通貨は最初から変動相場制で運用された。", answer:false, explain:"p.147・p.156。固定相場制。金・ドル本位制。"},
      {id:"adv-147-sdr-1", stage:"8-10", importance:"B", statement:"SDRはドル不足や国際流動性問題への対応として創設された特別引出権である。", answer:true, explain:"p.147・プリント8。細かいが通貨体制で狙われる。"},
      {id:"adv-147-sdr-2", stage:"8-10", importance:"B", statement:"SDRはGATTの関税引き下げ交渉の名称である。", answer:false, explain:"p.147。SDRはIMF関係の特別引出権。"},
      {id:"adv-147-fixed-1", stage:"8-10", importance:"A", statement:"固定相場制は為替レートが安定しやすいが、金・ドル保有量などが金融政策を制約する。", answer:true, explain:"p.147。メリットとデメリットの両方を見る。"},
      {id:"adv-147-floating-1", stage:"8-10", importance:"A", statement:"変動相場制では為替市場の通貨需給で相場が動き、為替リスクが発生する。", answer:true, explain:"p.147。金との固定リンクではない。"},
      {id:"adv-147-floating-2", stage:"8-10", importance:"A", statement:"変動相場制では各国通貨が金と一定比率で交換されるため、為替リスクは存在しない。", answer:false, explain:"p.147。金との固定リンクではない。"},
      {id:"adv-147-mfn-1", stage:"8-10", importance:"A", statement:"最恵国待遇は、特定国だけを不当に優遇・差別しないという無差別原則に関係する。", answer:true, explain:"p.147・p.156。GATT/WTO三原則。"},
      {id:"adv-147-national-treatment-1", stage:"8-10", importance:"A", statement:"内国民待遇は、輸入品を国内品と比べて不利に扱わないという考え方である。", answer:true, explain:"p.147・p.156。最恵国待遇との区別。"},
      {id:"adv-147-mfn-2", stage:"8-10", importance:"A", statement:"最恵国待遇とは、輸入品を国内品より必ず有利に扱うことを意味する。", answer:false, explain:"p.147。国内品との扱いは内国民待遇。最恵国待遇は国同士の無差別。"},
      {id:"adv-147-safeguard-1", stage:"8-10", importance:"B", statement:"セーフガードは、輸入急増などに対して一時的な緊急輸入制限を認める仕組みである。", answer:true, explain:"p.147・p.157。WTOでも例外的措置として出る。"},
      {id:"adv-147-safeguard-2", stage:"8-10", importance:"B", statement:"セーフガードは、すべての輸入制限を恒久的に禁止する制度である。", answer:false, explain:"p.147・p.157。緊急輸入制限を認める側。"},
      {id:"adv-147-round-1", stage:"8-10", importance:"B", statement:"ウルグアイ・ラウンドはWTO設立につながる重要な多角的貿易交渉である。", answer:true, explain:"p.147。ラウンド名とWTOの接続。"},
      {id:"adv-147-doha-1", stage:"8-10", importance:"C", statement:"ドーハ・ラウンドは各国の利害対立などで停滞している。", answer:true, explain:"p.147。細かいが選択肢で出る可能性。"},
      {id:"adv-148-global-1", stage:"8-10", importance:"B", statement:"多国籍企業は国境を越えて複数国に子会社や支店を持つ企業である。", answer:true, explain:"p.148・p.160。単なる輸出企業ではない。"},
      {id:"adv-148-global-2", stage:"8-10", importance:"B", statement:"多国籍企業とは、国内市場だけで活動し海外拠点を一切持たない企業をいう。", answer:false, explain:"p.148。国境を越える企業活動。"},
      {id:"adv-148-taxhaven-1", stage:"8-10", importance:"B", statement:"タックス・ヘイブンは税負担の低い国・地域と関係し、多国籍企業や国際資本移動の論点で出る。", answer:true, explain:"p.148。グローバル化の論点。"},
      {id:"adv-148-derivative-1", stage:"8-10", importance:"C", statement:"デリバティブは金融派生商品であり、国際金融の高度化と関係する。", answer:true, explain:"p.148。細かいが金融語として出る。"},
      {id:"adv-148-bottom-2", stage:"8-10", importance:"B", statement:"底辺への競争は、企業誘致のため法人税率や規制を下げ合う競争などを指す。", answer:true, explain:"p.148。労働・環境基準の低下も文脈。"},
      {id:"adv-148-summit-1", stage:"8-10", importance:"C", statement:"サミットやG7/G20は、石油危機後の主要国協議から広がった国際経済協議の枠組みである。", answer:true, explain:"p.148。細部だが国際経済協議。"},
      {id:"adv-148-integration-level-1", stage:"8-10", importance:"A", statement:"地域経済統合では、自由貿易圏、関税同盟、共同市場の順に統合の度合いが深まる。", answer:true, explain:"p.148・p.160。統合段階の順序。"},
      {id:"adv-148-integration-level-2", stage:"8-10", importance:"A", statement:"自由貿易圏は域外共通関税を設定し、関税同盟は労働力移動まで完全に自由化する。", answer:false, explain:"p.148・p.160。自由貿易圏=域内関税撤廃、関税同盟=域外共通関税。"},
      {id:"adv-148-customs-1", stage:"8-10", importance:"A", statement:"関税同盟は域内関税撤廃に加えて、域外に対する共通関税を設定する。", answer:true, explain:"p.148・p.160。自由貿易圏との違い。"},
      {id:"adv-148-common-market-1", stage:"8-10", importance:"A", statement:"共同市場では物品だけでなく、サービス・資本・労働者の移動も自由化する方向に進む。", answer:true, explain:"p.148・p.160。共同市場は統合度が高い。"},
      {id:"adv-148-asean-1", stage:"8-10", importance:"B", statement:"AFTAはASEANの自由貿易地域であり、北米の協定ではない。", answer:true, explain:"p.148・p.160。AFTA=ASEAN。"},
      {id:"adv-148-aec-1", stage:"8-10", importance:"B", statement:"AECはASEAN経済共同体で、共同市場をめざす枠組みとされる。", answer:true, explain:"p.148・プリント9。AFTAより統合が深い。"},
      {id:"adv-148-usmca-1", stage:"8-10", importance:"B", statement:"USMCAはNAFTAを引き継ぐ米国・メキシコ・カナダの協定である。", answer:true, explain:"p.148・p.160。北米。"},
      {id:"adv-148-mercosur-1", stage:"8-10", importance:"C", statement:"MERCOSURは南米南部共同市場であり、ASEANの自由貿易地域ではない。", answer:true, explain:"p.148・p.160。南米。"},
      {id:"adv-148-cptpp-1", stage:"8-10", importance:"A", statement:"CPTPPは米国離脱後のTPP11として発効した枠組みである。", answer:true, explain:"p.148・p.160。米国参加としない。"},
      {id:"adv-148-cptpp-2", stage:"8-10", importance:"A", statement:"CPTPPは米国が中心となって発効したため、米国は現在の主要参加国である。", answer:false, explain:"p.148・p.160。米国離脱後の枠組み。"},
      {id:"adv-161-brics-1", stage:"8-10", importance:"B", statement:"BRICSやNIES、ASEAN4、中国などは新興国・地域の成長を比較するグラフ問題で狙われる。", answer:true, explain:"p.161-162。グラフ読み取り。"},
      {id:"adv-161-brics-2", stage:"8-10", importance:"B", statement:"BRICSは先進国だけで構成されるG7の別名である。", answer:false, explain:"p.161-162。BRICSは新興国。"},
      {id:"adv-161-eu-treaty-1", stage:"8-10", importance:"A", statement:"マーストリヒト条約はEU設立、リスボン条約はEU機構改革と結びつける。", answer:true, explain:"p.148・p.161。条約の役割を入れ替えない。"},
      {id:"adv-161-eu-treaty-2", stage:"8-10", importance:"A", statement:"リスボン条約によってECSCが設立され、マーストリヒト条約によって英国がEUを離脱した。", answer:false, explain:"p.148・p.161。ECSCは欧州統合初期、マーストリヒトはEU設立。"},

      {id:"adv-149-warming-1", stage:"11-12", importance:"A", statement:"地球温暖化は、石炭・石油など化石燃料の消費による温室効果ガスの増加と関係する。", answer:true, explain:"p.149・p.162-163。温暖化の原因。"},
      {id:"adv-149-warming-2", stage:"11-12", importance:"A", statement:"地球温暖化はフロンガスによるオゾン層破壊だけを指し、化石燃料の消費とは関係しない。", answer:false, explain:"p.149。温暖化=温室効果ガス、オゾン層破壊=フロン。"},
      {id:"adv-149-ozone-1", stage:"11-12", importance:"A", statement:"オゾン層破壊はフロンガスと関係し、高緯度地域のオゾンホールが論点となる。", answer:true, explain:"p.149。フロン・オゾンホール。"},
      {id:"adv-149-acid-rain-1", stage:"11-12", importance:"A", statement:"酸性雨はSOxやNOxと関係し、森林枯死などの被害をもたらす。", answer:true, explain:"p.149。SOx/NOx。"},
      {id:"adv-149-acid-rain-2", stage:"11-12", importance:"A", statement:"酸性雨の主因はフロンガスであり、SOxやNOxは関係しない。", answer:false, explain:"p.149。フロンはオゾン層、酸性雨はSOx/NOx。"},
      {id:"adv-149-human-env-1", stage:"11-12", importance:"B", statement:"1972年の国連人間環境会議では「かけがえのない地球」が掲げられ、UNEP設置と関係する。", answer:true, explain:"p.149・プリント12。会議名とスローガン。"},
      {id:"adv-149-earth-summit-1", stage:"11-12", importance:"B", statement:"1992年の国連環境開発会議では、持続可能な開発や気候変動枠組条約などが重要論点となる。", answer:true, explain:"p.149。地球サミット。"},
      {id:"adv-149-earth-summit-2", stage:"11-12", importance:"B", statement:"国連環境開発会議のスローガンは「かけがえのない地球」で、国連人間環境会議のスローガンは「持続可能な開発」である。", answer:false, explain:"p.149。スローガンが逆。"},
      {id:"adv-149-nagoya-1", stage:"11-12", importance:"C", statement:"名古屋議定書は遺伝資源の利用による利益の公正な配分と関係する。", answer:true, explain:"プリント12。細かいが条約対象の識別。"},
      {id:"adv-149-kyoto-mech-1", stage:"11-12", importance:"B", statement:"京都メカニズムには共同実施、クリーン開発メカニズム、排出量取引が含まれる。", answer:true, explain:"p.149・p.162-163。京都議定書の仕組み。"},
      {id:"adv-149-paris-2", stage:"11-12", importance:"B", statement:"パリ協定は先進国だけでなく、すべての国が削減目標を提出する枠組みである。", answer:true, explain:"p.149・p.162-163。京都議定書との違い。"},
      {id:"adv-149-paris-3", stage:"11-12", importance:"B", statement:"パリ協定は先進国だけに削減義務を課し、途上国は一切参加しない。", answer:false, explain:"p.149・p.162-163。すべての国が参加する枠組み。"},
      {id:"adv-149-water-minamata-1", stage:"11-12", importance:"C", statement:"水俣条約は水銀による汚染防止と関係する。", answer:true, explain:"プリント12。条約対象の識別。"},
      {id:"adv-149-energy-1", stage:"11-12", importance:"B", statement:"一次エネルギーには化石燃料、核燃料、再生可能エネルギーなどが含まれ、電力は二次エネルギーにあたる。", answer:true, explain:"プリント12。一次・二次エネルギー。"},
      {id:"adv-149-energy-2", stage:"11-12", importance:"B", statement:"電力は石炭や石油と同じ一次エネルギーであり、二次エネルギーには含まれない。", answer:false, explain:"プリント12。電力は二次エネルギー。"},

      {id:"adv-150-population-1", stage:"4-2-6", importance:"B", statement:"発展途上国の人口爆発は、経済発展の阻害や貧困の深刻化と関係する。", answer:true, explain:"p.150。南北問題の周辺論点。"},
      {id:"adv-150-env-resp-1", stage:"4-2-6", importance:"B", statement:"地球環境問題では、先進国が引き起こした環境破壊は先進国の責任で解決すべきだという途上国側の主張がある。", answer:true, explain:"p.150。環境と開発をめぐる対立。"},
      {id:"adv-150-debt-1", stage:"4-2-6", importance:"B", statement:"累積債務問題では、デフォルト宣言やリスケジューリングが論点になる。", answer:true, explain:"p.150・p.164-167。債務問題。"},
      {id:"adv-150-debt-2", stage:"4-2-6", importance:"B", statement:"累積債務問題は、途上国が債務をすべて返済し終えたため援助が不要になった問題である。", answer:false, explain:"p.150。返済負担が増大する問題。"},
      {id:"adv-150-unctad-year-1", stage:"4-2-6", importance:"B", statement:"UNCTADは1964年設立の国連貿易開発会議で、南北問題の解決をめざした。", answer:true, explain:"p.150。UNCTAD=1964・貿易と開発。"},
      {id:"adv-150-prebisch-2", stage:"4-2-6", importance:"A", statement:"プレビッシュ報告は、一次産品輸出国が不利になりやすい構造を指摘した。", answer:true, explain:"p.150。モノカルチャー・一次産品と接続。"},
      {id:"adv-150-prebisch-3", stage:"4-2-6", importance:"A", statement:"プレビッシュ報告は、工業製品輸出国が常に一次産品輸出国より不利になると主張した。", answer:false, explain:"p.150。一次産品輸出国の不利。"},
      {id:"adv-150-nieo-2", stage:"4-2-6", importance:"B", statement:"NIEOは資源ナショナリズムを背景に、天然資源を自国で管理する権利などを主張した。", answer:true, explain:"p.150。新国際経済秩序。"},
      {id:"adv-150-nieo-3", stage:"4-2-6", importance:"B", statement:"NIEOは先進国が途上国の天然資源を自由に管理する権利を強化する構想である。", answer:false, explain:"p.150。途上国側の資源主権の主張。"},
      {id:"adv-150-oda-07-1", stage:"4-2-6", importance:"B", statement:"ODAには対GNI比0.7%目標があるが、達成国は多くない。", answer:true, explain:"p.150。細かいがODA論点。"},
      {id:"adv-150-oda-07-2", stage:"4-2-6", importance:"B", statement:"ODAの対GNI比0.7%目標はほぼすべての先進国が常に達成している。", answer:false, explain:"p.150。達成国は少ない。"},
      {id:"adv-150-human-security-2", stage:"4-2-6", importance:"A", statement:"人間の安全保障は、国家だけでなく個人の生命や生活を貧困・戦争などから守る考え方である。", answer:true, explain:"p.150。国家安全保障だけではない。"},
      {id:"adv-150-human-security-3", stage:"4-2-6", importance:"A", statement:"人間の安全保障は国家の軍事力強化だけを目的とし、個人の生活や貧困問題は扱わない。", answer:false, explain:"p.150。個人の生命・生活を守る。"},
      {id:"adv-150-mdgs-year-1", stage:"4-2-6", importance:"A", statement:"MDGsは2001年にまとめられ、2015年までの8目標とされる。", answer:true, explain:"p.150。MDGs=2001・2015・8。"},
      {id:"adv-150-sdgs-year-1", stage:"4-2-6", importance:"A", statement:"SDGsは2016年から2030年までの17目標で、「誰一人取り残さない」を掲げる。", answer:true, explain:"p.150。SDGs=2016・2030・17。"},
      {id:"adv-150-ngo-examples-1", stage:"4-2-6", importance:"B", statement:"NGOの例として、国境なき医師団や地雷禁止国際キャンペーンなどが挙げられる。", answer:true, explain:"p.150。国連機関ではない。"},
      {id:"adv-150-dev-import-1", stage:"4-2-6", importance:"B", statement:"開発輸入は、途上国に生産技術や資本を提供して開発を進め、商品を輸入する方式である。", answer:true, explain:"p.150。ODAそのものではない。"},
      {id:"adv-150-dev-import-2", stage:"4-2-6", importance:"B", statement:"開発輸入は、先進国が途上国からの輸入をすべて禁止する政策である。", answer:false, explain:"p.150。技術・資本提供と輸入。"},
      {id:"adv-150-japan-oda-1", stage:"4-2-6", importance:"B", statement:"日本のODAはアジア中心・産業基盤整備が多いとされ、技術協力も含む。", answer:true, explain:"p.150・p.166。日本の国際協力。"},
      {id:"adv-150-japan-oda-2", stage:"4-2-6", importance:"B", statement:"日本のODAは技術協力を含まず、軍事用途に限定して行われる。", answer:false, explain:"p.150・p.166。技術協力を含む。軍事用途回避が大綱で重要。"},
      {id:"adv-150-oda-charter-1", stage:"4-2-6", importance:"B", statement:"ODA大綱では、環境と開発の両立や軍事的用途の回避などが重視された。", answer:true, explain:"p.150。ODA大綱1992。"},
      {id:"adv-150-dev-coop-1", stage:"4-2-6", importance:"B", statement:"開発協力大綱では、国益の確保への貢献や戦略性強化が明記された。", answer:true, explain:"p.150。2015年の開発協力大綱。"},
      {id:"adv-164-growth-model-1", stage:"4-2-6", importance:"B", statement:"輸出主導型成長、輸入代替工業化、外資導入、モノカルチャー経済は、それぞれ異なる発展戦略・経済構造として区別する。", answer:true, explain:"p.164-167。問題演習の識別論点。"},
      {id:"adv-164-growth-model-2", stage:"4-2-6", importance:"B", statement:"輸出主導型成長と輸入代替工業化は同じ政策で、どちらも輸入品を国内生産に置き換えることだけを意味する。", answer:false, explain:"p.164-167。輸出主導と輸入代替は別。"},
      {id:"adv-164-unicef-1", stage:"4-2-6", importance:"C", statement:"UNICEFは児童支援などと関係する国連機関であり、WTOの貿易紛争処理機関ではない。", answer:true, explain:"p.164-167。国際機関の役割識別。"},
      {id:"adv-164-oecd-2", stage:"4-2-6", importance:"C", statement:"OECDは先進国中心の経済協力機構であり、UNCTADやUNDPとは役割が異なる。", answer:true, explain:"p.164-167。国際機関の混同対策。"},
      {id:"adv-164-wto-mfn-1", stage:"4-2-6", importance:"C", statement:"WTOの最恵国待遇は、加盟国間で特定国だけを不利または有利に扱わないという無差別原則と関係する。", answer:true, explain:"p.164-167。4編でも国際制度として再登場。"},
      {id:"adv-164-security-council-1", stage:"4-2-6", importance:"C", statement:"国連安全保障理事会の常任理事国には拒否権がある。", answer:true, explain:"p.164-167。国際制度の正誤で混ざる。"},
      {id:"adv-164-security-council-2", stage:"4-2-6", importance:"C", statement:"国連安全保障理事会では、すべての加盟国が常任理事国として拒否権を持つ。", answer:false, explain:"p.164-167。拒否権は常任理事国。"},
      {id:"adv-164-ibrd-vote-1", stage:"4-2-6", importance:"C", statement:"IBRDなど国際金融機関では、出資比率が議決権に影響する仕組みがある。", answer:true, explain:"p.164-167。国際制度の細かい正誤。"},
      {id:"adv-167-aiib-1", stage:"4-2-6", importance:"B", statement:"AIIBはアジアインフラ投資銀行で、中国主導の国際金融機関として一帯一路などと関連して問われる。", answer:true, explain:"p.167。AIIB・一帯一路・ODAの識別。"},
      {id:"adv-167-aiib-2", stage:"4-2-6", importance:"B", statement:"AIIBは日本の青年海外協力隊の別名であり、JICAの主要事業である。", answer:false, explain:"p.167。JOCVとAIIBを混同しない。"},
      {id:"adv-167-bri-1", stage:"4-2-6", importance:"B", statement:"一帯一路は中国の広域経済圏構想として、AIIBなどと結びつけて出題されやすい。", answer:true, explain:"p.167。中国・AIIB・対外進出。"},

      {id:"adv-cross-1", stage:"all", importance:"A", statement:"IMF・IBRD・UNDP・UNCTAD・JICAはすべて国際協力に関わるが、通貨安定、開発融資、人間開発、貿易と開発、日本の実施機関という役割は区別する。", answer:true, explain:"横断。略語の役割をまとめて入れ替える問題に注意。"},
      {id:"adv-cross-2", stage:"all", importance:"A", statement:"UNCTADはHDIを発表し、UNDPは一般特恵関税を要求し、JICAはWTOの紛争処理を担当する。", answer:false, explain:"横断。UNDP=HDI、UNCTAD=貿易と開発、JICA=日本の国際協力機構。"},
      {id:"adv-cross-3", stage:"all", importance:"A", statement:"ニクソン・ショック、プラザ合意、円高不況、産業の空洞化は、国際通貨体制と日本経済の変化をつなげて問われやすい。", answer:true, explain:"横断。p.108-109とp.147の接続。"},
      {id:"adv-cross-4", stage:"all", importance:"A", statement:"PPP、環境アセスメント、3R、京都議定書、パリ協定はすべて同じ制度で、名称が違うだけで内容は同一である。", answer:false, explain:"横断。PPP=汚染者負担、アセス=事前評価、3R=循環、京都・パリ=温暖化条約。"},
      {id:"adv-cross-5", stage:"all", importance:"A", statement:"GATT11条国とIMF8条国、FTAとEPA、MDGsとSDGsのように、似た語は対象・年・役割の違いで切る。", answer:true, explain:"横断。本番は似た語の入れ替えが多い。"}
    ];
    judgeStatements.push(...advancedJudgeStatements);

    const stages = [
      {id:"all", name:"全範囲", note:"まとめて演習"},
      {id:"8-10", name:"8-10 国際経済", note:"41点範囲"},
      {id:"11-12", name:"11-12 制度・環境", note:"31点範囲"},
      {id:"3-3-1", name:"3編3章1", note:"語群選択"},
      {id:"4-2-6", name:"4編2章6", note:"略語ペア"}
    ];
    const modes = [
      {id:"choice", name:"4択ペア", note:"基本演習"},
      {id:"type", name:"語句入力", note:"語群選択対策"},
      {id:"judge", name:"正誤仕分け・問題集級", note:"専用232問"},
      {id:"deck", name:"カード一覧", note:"確認用"}
    ];
    const flows = {
      "8-10": ["ブレトンウッズ協定", "IMF・IBRD・GATT", "ドル危機", "ニクソン・ショック", "スミソニアン協定", "変動相場制", "キングストン合意", "WTO", "地域統合"],
      "11-12": ["中小企業の二重構造", "農地改革・農業基本法", "消費者保護", "PL法・クーリングオフ", "公害", "PPP", "環境基本法", "3R・循環型社会"],
      "3-3-1": ["経済民主化", "傾斜生産方式", "ドッジ・ライン", "高度成長", "ニクソン・ショック", "石油危機", "プラザ合意", "バブル", "デフレ"],
      "4-2-6": ["南北問題", "UNCTAD", "ODA", "HDI", "人間の安全保障", "MDGs", "SDGs", "NGO・フェアトレード"]
    };

    const STORAGE_KEY = "seikeiStudyProgressV2";
    const storedProgress = loadProgress();

    const state = {
      mode: "choice",
      stage: "all",
      queue: [],
      current: null,
      locked: false,
      ok: storedProgress.stats.ok || 0,
      miss: storedProgress.stats.miss || 0,
      streak: storedProgress.stats.streak || 0,
      answered: 0,
      roundLimit: null,
      limited: false,
      weakOnly: false,
      weak: storedProgress.weak,
      learned: storedProgress.learned
    };

    const $ = (id) => document.getElementById(id);

    function loadProgress() {
      const fallback = {stats: {}, weak: {}, learned: {}};
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (saved && typeof saved === "object") {
          return {
            stats: saved.stats || {},
            weak: saved.weak || {},
            learned: saved.learned || {}
          };
        }
      } catch {}
      try {
        fallback.weak = JSON.parse(localStorage.getItem("seikeiWeakMap") || "{}");
      } catch {}
      return fallback;
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        stats: {ok: state.ok, miss: state.miss, streak: state.streak},
        weak: state.weak,
        learned: state.learned
      }));
    }

    function progressKey(item, mode = state.mode) {
      return `${mode}:${item.id}`;
    }

    function learnedEntry(item) {
      return state.learned[progressKey(item)] || {seen: 0, correct: 0, wrong: 0, lastSeen: 0};
    }

    function hasSeen(item) {
      return learnedEntry(item).seen > 0;
    }

    function weakCount(item) {
      return state.weak[progressKey(item)] || state.weak[item.id] || 0;
    }

    function markLearned(ok) {
      const key = progressKey(state.current);
      const entry = state.learned[key] || {seen: 0, correct: 0, wrong: 0, lastSeen: 0};
      entry.seen++;
      if (ok) entry.correct++;
      else entry.wrong++;
      entry.lastSeen = Date.now();
      state.learned[key] = entry;
    }

    function filteredCards() {
      const q = $("searchInput").value.trim();
      return cards.filter(card => {
        const stageOk = state.stage === "all" || card.stage === state.stage;
        const qOk = !q || [card.term, card.clue, card.trap, card.pair].join(" ").includes(q);
        return stageOk && qOk;
      });
    }

    function filteredJudgeStatements() {
      const q = $("searchInput").value.trim();
      return judgeStatements.filter(item => {
        const stageOk = state.stage === "all" || item.stage === state.stage;
        const qOk = !q || [item.statement, item.explain].join(" ").includes(q);
        return stageOk && qOk;
      });
    }

    function weight(card) {
      const weak = weakCount(card);
      const imp = card.importance === "A" ? 3 : card.importance === "B" ? 2 : 1;
      const learned = learnedEntry(card);
      const unseenBoost = learned.seen ? 0 : 8;
      const missBoost = Math.min(learned.wrong, 4) * 2;
      const knownPenalty = learned.correct >= 3 && weak === 0 ? 1 : 0;
      return Math.max(1, imp + unseenBoost + weak * 5 + missBoost - knownPenalty);
    }

    function shuffle(list) {
      const arr = list.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function studyPool() {
      return state.mode === "judge" ? filteredJudgeStatements() : filteredCards();
    }

    function buildQueue(weakOnly = false, options = {}) {
      state.limited = !!options.limited;
      state.roundLimit = state.limited ? (options.limit || 50) : null;
      state.weakOnly = weakOnly;
      state.answered = 0;
      state.queue = makeQueue(weakOnly);
      nextQuestion();
    }

    function makeQueue(weakOnly = false) {
      let pool = state.mode === "judge" ? filteredJudgeStatements() : filteredCards();
      if (weakOnly) {
        pool = pool.filter(item => weakCount(item) > 0);
        if (!pool.length) {
          pool = (state.mode === "judge" ? filteredJudgeStatements() : filteredCards()).filter(item => item.importance === "A");
        }
      }
      if (!pool.length) return [];
      const target = state.limited ? state.roundLimit : Math.max(80, pool.length);
      const unseen = shuffle(pool.filter(item => !hasSeen(item))).sort((a, b) => importanceScore(b) - importanceScore(a));
      const seen = pool.filter(item => hasSeen(item));
      const weighted = [];
      (seen.length ? seen : pool).forEach(item => {
        for (let i = 0; i < weight(item); i++) weighted.push(item);
      });
      const queue = unseen.slice();
      while (queue.length < target) {
        queue.push(...shuffle(weighted.length ? weighted : pool));
      }
      return avoidImmediateRepeats(queue.slice(0, target));
    }

    function nextQuestion() {
      if (state.limited && state.answered >= state.roundLimit && state.mode !== "deck") {
        renderResult();
        updateStats();
        return;
      }
      state.locked = false;
      if (!state.queue.length) state.queue = makeQueue(state.weakOnly);
      state.current = nextQueuedItem();
      if (!state.current) {
        renderDeck();
        return;
      }
      if (state.mode === "deck") renderDeck();
      else renderQuestion();
      updateStats();
    }

    function nextQueuedItem() {
      const item = state.queue.shift();
      if (!item || !state.current || item.id !== state.current.id) return item;
      const swapIndex = state.queue.findIndex(candidate => candidate.id !== item.id);
      if (swapIndex === -1) return item;
      const replacement = state.queue.splice(swapIndex, 1)[0];
      state.queue.unshift(item);
      return replacement;
    }

    function importanceScore(item) {
      return item.importance === "A" ? 3 : item.importance === "B" ? 2 : 1;
    }

    function avoidImmediateRepeats(list) {
      for (let i = 1; i < list.length; i++) {
        if (list[i].id !== list[i - 1].id) continue;
        const swapIndex = list.findIndex((item, index) => index > i && item.id !== list[i - 1].id);
        if (swapIndex !== -1) [list[i], list[swapIndex]] = [list[swapIndex], list[i]];
      }
      return list;
    }

    function scheduleReview(item) {
      const first = Math.min(4, state.queue.length);
      state.queue.splice(first, 0, item);
      const second = Math.min(first + 5, state.queue.length);
      state.queue.splice(second, 0, item);
    }

    function wrongOptions(card) {
      return shuffle(cards.filter(c => c.id !== card.id && c.stage === card.stage).concat(cards.filter(c => c.id !== card.id)))
        .map(c => c.term)
        .filter((v, i, a) => a.indexOf(v) === i)
        .slice(0, 3);
    }

    function renderQuestion() {
      const card = state.current;
      const badgeClass = card.importance.toLowerCase();
      let interaction = "";
      let label = "手がかり";
      let prompt = card.clue;
      let hint = `混同注意: ${card.trap}`;

      if (state.mode === "choice") {
        const choices = shuffle([card.term].concat(wrongOptions(card)));
        interaction = `<div class="choices">${choices.map(c => `<button data-answer="${escapeAttr(c)}">${escapeHtml(c)}</button>`).join("")}</div>`;
      } else if (state.mode === "type") {
        interaction = `<div class="text-answer"><input id="answerInput" autocomplete="off" placeholder="語句を入力"><button class="primary" id="submitText">判定</button></div>`;
      } else if (state.mode === "judge") {
        state.judge = card;
        label = "問題集レベル正誤";
        prompt = card.statement;
        hint = "語尾・役割・順序・対象をよく見る。正しいなら「正しい」、違うなら「誤り」。";
        interaction = `<div class="choices"><button data-judge="true">正しい</button><button data-judge="false">誤り</button></div>`;
      }

      $("gameArea").className = "arena";
      $("gameArea").innerHTML = `
        <section class="question-card">
          <div class="question-top">
            <span class="badge ${badgeClass}">重要度${card.importance}</span>
            <span class="badge">${stageName(card.stage)}</span>
          </div>
          <div class="question-body">
            <div class="prompt-label">${label}</div>
            <p class="prompt">${escapeHtml(prompt)}</p>
            <p class="hint">${escapeHtml(hint)}</p>
            ${interaction}
          </div>
          <div class="feedback" id="feedback">わからなくて普通。押した瞬間に覚える。</div>
        </section>
        <aside class="right-panel">
          <div class="meter">
            <b>${escapeHtml(progressTitle())}</b>
            <div class="bar"><div class="fill" style="width:${progressPercent()}%"></div></div>
            <div style="margin-top:8px;color:var(--muted);font-size:13px;">${escapeHtml(progressText())}</div>
          </div>
          <div class="weak-list">
            <b>いまの弱点</b>
            <ul id="weakList">${weakListHtml()}</ul>
          </div>
          <div class="flow-box">
            <b>流れ</b>
            ${flowHtml()}
          </div>
        </aside>
      `;

      document.querySelectorAll("[data-answer]").forEach(btn => {
        btn.addEventListener("click", () => checkChoice(btn, btn.dataset.answer === card.term));
      });
      document.querySelectorAll("[data-judge]").forEach(btn => {
        btn.addEventListener("click", () => checkChoice(btn, String(state.judge.answer) === btn.dataset.judge, state.judge.explain));
      });
      const submit = $("submitText");
      if (submit) {
        submit.addEventListener("click", checkText);
        $("answerInput").addEventListener("keydown", ev => {
          if (ev.key === "Enter") checkText();
        });
        $("answerInput").focus();
      }
    }

    function checkChoice(btn, ok, explainText) {
      if (state.locked) return;
      state.locked = true;
      if (ok) {
        btn.classList.add("correct");
        markCorrect();
      } else {
        btn.classList.add("wrong");
        document.querySelectorAll("[data-answer]").forEach(b => {
          if (b.dataset.answer === state.current.term) b.classList.add("correct");
        });
        markWrong();
      }
      showFeedback(ok, explainText);
      setTimeout(nextQuestion, ok ? 900 : 1800);
    }

    function checkText() {
      if (state.locked) return;
      const input = $("answerInput");
      const value = normalize(input.value);
      const answer = normalize(state.current.term);
      const ok = value && (answer.includes(value) || value.includes(answer));
      state.locked = true;
      if (ok) markCorrect();
      else markWrong();
      showFeedback(ok);
      setTimeout(nextQuestion, ok ? 900 : 2000);
    }

    function markCorrect() {
      state.ok++;
      state.streak++;
      state.answered++;
      markLearned(true);
      const key = progressKey(state.current);
      const old = weakCount(state.current);
      if (old > 0) state.weak[key] = old - 1;
      saveProgress();
      updateStats();
    }

    function markWrong() {
      state.miss++;
      state.streak = 0;
      state.answered++;
      markLearned(false);
      const key = progressKey(state.current);
      state.weak[key] = weakCount(state.current) + 1;
      scheduleReview(state.current);
      saveProgress();
      updateStats();
    }

    function showFeedback(ok, explainText) {
      const fb = $("feedback");
      fb.className = `feedback ${ok ? "ok" : "bad"}`;
      const c = state.current;
      const combo = ok ? comboText() : "弱点に追加しました。";
      if (state.mode === "judge") {
        const answerText = c.answer ? "正しい" : "誤り";
        fb.innerHTML = ok
          ? `<b>${escapeHtml(combo)}</b> 判定: ${answerText}。${escapeHtml(c.explain)}`
          : `<b>${escapeHtml(combo)}</b> 判定は「${answerText}」。${escapeHtml(c.explain)}`;
        return;
      }
      fb.innerHTML = ok
        ? `<b>${escapeHtml(combo)}</b> ${escapeHtml(c.term)} = ${escapeHtml(c.clue)}`
        : `<b>${escapeHtml(combo)}</b> 正解は「${escapeHtml(c.term)}」。${escapeHtml(explainText || c.clue)} / セット語: ${escapeHtml(c.pair)}`;
    }

    function renderResult() {
      const total = state.ok + state.miss;
      const recentRate = total ? Math.round(state.ok / total * 100) : 0;
      const weakNow = currentModeWeakCount();
      const rank = recentRate >= 90 && weakNow <= 4 ? "S" : recentRate >= 78 ? "A" : recentRate >= 62 ? "B" : "C";
      const message = rank === "S"
        ? "重要語の定着が進んでいます。次は正誤仕分けで確認。"
        : rank === "A"
          ? "かなり安定しています。弱点だけもう一周。"
          : rank === "B"
            ? "弱点を絞れています。短く回して固めましょう。"
            : "まずはミスした語を集めます。弱点だけで復習。";
      $("gameArea").className = "arena";
      $("gameArea").innerHTML = `
        <section class="question-card">
          <div class="question-top">
            <span class="badge a">RESULT</span>
            <span class="badge">${escapeHtml(stageName(state.stage))}</span>
          </div>
          <div class="question-body">
            <div class="prompt-label">演習終了</div>
            <p class="prompt">ランク ${rank}</p>
            <p class="hint">${escapeHtml(message)}</p>
            <div class="choices">
              <button class="primary" id="againBtn">もう一回</button>
              <button id="weakAgainBtn">弱点だけ</button>
              <button id="judgeNextBtn">正誤仕分けへ</button>
              <button id="deckNextBtn">カード一覧</button>
            </div>
          </div>
          <div class="feedback ok">正解 ${state.ok} / ミス ${state.miss} / 弱点 ${weakNow}</div>
        </section>
        <aside class="right-panel">
          <div class="weak-list">
            <b>次に潰す語</b>
            <ul>${weakListHtml()}</ul>
          </div>
          <div class="flow-box">
            <b>おすすめ</b>
            <ol><li>弱点だけ</li><li>正誤仕分け</li><li>問題集を解く</li></ol>
          </div>
        </aside>
      `;
      $("againBtn").addEventListener("click", () => buildQueue(false, {limited: true, limit: 50}));
      $("weakAgainBtn").addEventListener("click", () => buildQueue(true));
      $("judgeNextBtn").addEventListener("click", () => {
        state.mode = "judge";
        renderControls();
        buildQueue(false);
      });
      $("deckNextBtn").addEventListener("click", () => {
        state.mode = "deck";
        renderControls();
        renderDeck();
      });
    }

    function renderDeck() {
      if (state.mode === "judge") {
        renderJudgeDeck();
        return;
      }
      const pool = filteredCards();
      $("gameArea").className = "deck-view";
      $("gameArea").innerHTML = pool.map(card => `
        <article class="mini-card">
          <span class="badge ${card.importance.toLowerCase()}">重要度${card.importance}</span>
          <h3>${escapeHtml(card.term)}</h3>
          <p>${escapeHtml(card.clue)}</p>
          <p style="margin-top:8px;">混同: ${escapeHtml(card.trap)}</p>
        </article>
      `).join("");
    }

    function renderJudgeDeck() {
      const pool = filteredJudgeStatements();
      $("gameArea").className = "deck-view";
      $("gameArea").innerHTML = pool.map(item => `
        <article class="mini-card">
          <span class="badge ${item.importance.toLowerCase()}">重要度${item.importance}</span>
          <h3>${item.answer ? "正しい" : "誤り"}</h3>
          <p>${escapeHtml(item.statement)}</p>
          <p style="margin-top:8px;">${escapeHtml(item.explain)}</p>
        </article>
      `).join("");
    }

    function renderControls() {
      updatePanelSummaries();
      $("modeGrid").innerHTML = modes.map(mode => `
        <button class="${state.mode === mode.id ? "selected" : ""}" data-mode="${mode.id}">
          ${mode.name}<small>${mode.note}</small>
        </button>
      `).join("");
      $("stageGrid").innerHTML = stages.map(stage => `
        <button class="${state.stage === stage.id ? "selected" : ""}" data-stage="${stage.id}">
          ${stage.name}<small>${stage.note}</small>
        </button>
      `).join("");
      document.querySelectorAll("[data-mode]").forEach(btn => btn.addEventListener("click", () => {
        state.mode = btn.dataset.mode;
        renderControls();
        if (window.matchMedia("(max-width: 900px)").matches) $("modePanel").open = false;
        if (state.mode === "deck") renderDeck();
        else buildQueue(false);
      }));
      document.querySelectorAll("[data-stage]").forEach(btn => btn.addEventListener("click", () => {
        state.stage = btn.dataset.stage;
        renderControls();
        if (window.matchMedia("(max-width: 900px)").matches) $("stagePanel").open = false;
        if (state.mode === "deck") renderDeck();
        else buildQueue(false);
      }));
    }

    function updatePanelSummaries() {
      const isDesktop = window.matchMedia("(min-width: 901px)").matches;
      $("modePanel").querySelector("summary").textContent = isDesktop ? "MODE" : `MODE: ${modeName(state.mode)}`;
      $("stagePanel").querySelector("summary").textContent = isDesktop ? "STAGE" : `STAGE: ${stageName(state.stage)}`;
      if (isDesktop) {
        $("modePanel").open = true;
        $("stagePanel").open = true;
      }
    }

    function updateStats() {
      const summary = learningSummary();
      $("okCount").textContent = state.ok;
      $("missCount").textContent = state.miss;
      $("learnedCount").textContent = `${summary.learned}/${summary.total}`;
      $("streakCount").textContent = state.streak;
      $("weakCount").textContent = currentModeWeakCount();
      const weak = $("weakList");
      if (weak) weak.innerHTML = weakListHtml();
    }

    function weakListHtml() {
      const weakCards = studyPool()
        .map(card => ({card, n: weakCount(card)}))
        .filter(x => x.n > 0)
        .sort((a,b) => b.n - a.n)
        .slice(0, 8);
      if (!weakCards.length) return `<li>まだなし。ミスした語がここに出る。</li>`;
      return weakCards.map(x => `<li><b>${escapeHtml(itemTitle(x.card))}</b><br>${escapeHtml(itemClue(x.card))} (${x.n})</li>`).join("");
    }

    function currentModeWeakCount() {
      return studyPool().filter(item => weakCount(item) > 0).length;
    }

    function learningSummary() {
      const pool = studyPool();
      const learned = pool.filter(item => hasSeen(item)).length;
      return {learned, total: pool.length};
    }

    function progressPercent() {
      if (state.limited && state.roundLimit) return Math.min(100, state.answered / state.roundLimit * 100);
      const summary = learningSummary();
      return summary.total ? Math.round(summary.learned / summary.total * 100) : 0;
    }

    function progressText() {
      if (state.limited && state.roundLimit) return `${state.answered}/${state.roundLimit}問`;
      const summary = learningSummary();
      return `${state.answered}問 / 既習 ${summary.learned}/${summary.total}`;
    }

    function itemTitle(item) {
      if (item.term) return item.term;
      return item.statement.length > 26 ? item.statement.slice(0, 26) + "..." : item.statement;
    }

    function itemClue(item) {
      return item.clue || item.explain || "";
    }

    function flowHtml() {
      const key = state.stage === "all" ? state.current?.stage : state.stage;
      const list = flows[key] || flows["3-3-1"];
      return `<ol>${list.map(x => `<li>${escapeHtml(x)}</li>`).join("")}</ol>`;
    }

    function stageName(id) {
      return (stages.find(s => s.id === id) || {}).name || id;
    }

    function modeName(id) {
      return (modes.find(m => m.id === id) || {}).name || id;
    }

    function progressTitle() {
      if (state.stage === "8-10") return "41点範囲";
      if (state.stage === "11-12") return "31点範囲";
      if (state.stage === "3-3-1") return "語群選択";
      if (state.stage === "4-2-6") return "略語確認";
      return "全範囲";
    }

    function comboText() {
      if (state.streak >= 12) return "12連続。安定しています。";
      if (state.streak >= 8) return "8連続。よく定着しています。";
      if (state.streak >= 5) return "5連続。";
      if (state.streak >= 3) return "3連続。";
      return "正解。";
    }

    function normalize(text) {
      return String(text).trim().toLowerCase().replace(/[・\s　／/()（）-]/g, "");
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(text) { return escapeHtml(text); }

    $("startBtn").addEventListener("click", () => buildQueue(false, {limited: true, limit: 50}));
    $("weakBtn").addEventListener("click", () => buildQueue(true));
    $("resetBtn").addEventListener("click", () => {
      state.ok = 0; state.miss = 0; state.streak = 0; state.weak = {};
      saveProgress();
      buildQueue(false);
    });
    $("deckBtn").addEventListener("click", () => {
      state.mode = "deck";
      renderControls();
      renderDeck();
    });
    $("searchInput").addEventListener("input", () => state.mode === "deck" ? renderDeck() : buildQueue(false));

    window.addEventListener("resize", updatePanelSummaries);
    updatePanelSummaries();
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    renderControls();
    buildQueue(false);
  </script>
</body>
</html>
